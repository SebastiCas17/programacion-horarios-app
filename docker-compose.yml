services:
  backend:
    build: .
    container_name: horarios_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://horarios_user:horarios_password@postgres:5432/horarios_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15
    container_name: horarios_postgres
    restart: always
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: horarios_user
      POSTGRES_PASSWORD: horarios_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horarios_user -d horarios_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: horarios_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: