services:
  postgres:
    image: postgres:15
    container_name: horarios_postgres
    restart: always
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: horarios_user
      POSTGRES_PASSWORD: horarios_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: horarios_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: